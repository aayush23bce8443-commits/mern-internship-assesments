<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Personal Information</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
        padding: 20px;
      }

      .form-container {
        width: 500px;
      }

      fieldset {
        border: none;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(15px);
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      }

      legend {
        font-size: 24px;
        font-weight: bold;
        color: white;
        padding: 0 10px;
      }

      .form-group {
        margin-bottom: 18px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: white;
        font-weight: 500;
      }

      input[type="text"],
      input[type="email"],
      input[type="password"],
      input[type="date"],
      textarea {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.9);
        font-size: 15px;
        outline: none;
        transition: 0.3s;
      }

      input:focus,
      textarea:focus {
        transform: scale(1.02);
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
      }

      .radio-group {
        display: flex;
        gap: 20px;
        margin-top: 8px;
      }

      .radio-group label {
        color: white;
        cursor: pointer;
      }

      textarea {
        resize: none;
        height: 90px;
      }

      button {
        width: 100%;
        padding: 14px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(45deg, #00c6ff, #0072ff);
        color: white;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(0, 114, 255, 0.5);
      }

      input[type="radio"] {
        margin-right: 5px;
        accent-color: #00c6ff;
      }
    </style>
  </head>

  <body>
    <div class="form-container">
      <form action="" method="POST">
        <fieldset>
          <legend>User Personal Information</legend>

          <div class="form-group">
            <label>Enter Full Name</label>
            <input type="text" value="Rahul Kumar" />
          </div>

          <div class="form-group">
            <label>Enter Your Email</label>
            <input type="email" value="geeks12345@gmail.com" />
          </div>

          <div class="form-group">
            <label>Enter Your Password</label>
            <input type="password" />
          </div>

          <div class="form-group">
            <label>Confirm Your Password</label>
            <input type="password" />
          </div>

          <div class="form-group">
            <label>Enter Your Gender</label>

            <div class="radio-group">
              <label><input type="radio" name="gender" checked /> Male</label>
              <label><input type="radio" name="gender" /> Female</label>
              <label><input type="radio" name="gender" /> Neutral</label>
            </div>
          </div>

          <div class="form-group">
            <label>Enter Your Date of Birth</label>
            <input type="date" value="2009-06-10" />
          </div>

          <div class="form-group">
            <label>Enter Your Address</label>
            <textarea>Noida Sector 137</textarea>
          </div>

          <button type="submit">Submit Information</button>
        </fieldset>
      </form>
    </div>
  </body>
</html>
