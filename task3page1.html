<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkillForge Academy</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        background: linear-gradient(135deg, #0f172a, #1e293b, #312e81);
        color: white;
      }

      /* Navbar */

      .top-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px 80px;

        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(15px);

        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .brand-name {
        font-size: 1.8rem;
        font-weight: bold;
        color: #38bdf8;
      }

      .brand-name::before {
        content: "🚀 ";
      }

      .menu-links {
        list-style: none;
        display: flex;
        gap: 30px;
      }

      .menu-links a {
        text-decoration: none;
        color: white;
        font-weight: 500;
        transition: 0.3s;
      }

      .menu-links a:hover,
      .menu-links a.current {
        color: #38bdf8;
      }

      /* Hero Section */

      .hero-section {
        min-height: 85vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 40px;
      }

      .hero-section h1 {
        font-size: 4rem;
        margin-bottom: 20px;

        background: linear-gradient(to right, #38bdf8, #818cf8, #c084fc);

        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .tagline {
        font-size: 1.2rem;
        color: #cbd5e1;
        margin-bottom: 40px;
      }

      /* Card */

      .media-card {
        width: 600px;
        max-width: 100%;

        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(20px);

        border-radius: 25px;

        padding: 25px;

        border: 1px solid rgba(255, 255, 255, 0.1);

        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);

        transition: 0.4s;
      }

      .media-card:hover {
        transform: translateY(-8px);
      }

      .display-screen {
        height: 300px;

        background:
          linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.5)),
          url("https://images.unsplash.com/photo-1498050108023-c5249f4df085?w=1200");

        background-size: cover;
        background-position: center;

        border-radius: 20px;

        display: flex;
        justify-content: center;
        align-items: center;

        position: relative;
        overflow: hidden;
      }

      .banner-text {
        font-size: 2rem;
        font-weight: bold;

        background: rgba(0, 0, 0, 0.4);

        padding: 15px 30px;

        border-radius: 12px;

        backdrop-filter: blur(10px);

        letter-spacing: 2px;
      }

      /* Media Controls */

      .media-controls {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;

        background: rgba(0, 0, 0, 0.6);

        display: flex;
        align-items: center;

        padding: 15px;
      }

      .play-icon {
        width: 0;
        height: 0;

        border-top: 8px solid transparent;
        border-left: 14px solid #38bdf8;
        border-bottom: 8px solid transparent;
      }

      .timeline-bar {
        flex: 1;
        height: 6px;

        background: #334155;

        margin: 0 15px;

        border-radius: 10px;

        overflow: hidden;
      }

      .timeline-bar::after {
        content: "";
        display: block;

        width: 60%;
        height: 100%;

        background: linear-gradient(to right, #38bdf8, #8b5cf6);
      }

      .audio-icons {
        font-size: 18px;
      }

      /* Audio */

      audio {
        width: 100%;
        margin-top: 20px;
      }

      /* Button */

      .join-btn {
        margin-top: 30px;
        padding: 14px 30px;

        border: none;
        border-radius: 30px;

        background: linear-gradient(to right, #38bdf8, #8b5cf6);

        color: white;
        font-size: 16px;
        font-weight: bold;

        cursor: pointer;

        transition: 0.3s;
      }

      .join-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(56, 189, 248, 0.6);
      }

      /* Responsive */

      @media (max-width: 768px) {
        .top-bar {
          flex-direction: column;
          gap: 15px;
          padding: 20px;
        }

        .hero-section h1 {
          font-size: 2.5rem;
        }

        .menu-links {
          gap: 15px;
        }
      }
    </style>
  </head>

  <body>
    <nav class="top-bar">
      <div class="brand-name">SkillForge Academy</div>

      <ul class="menu-links">
        <li><a href="#" class="current">Dashboard</a></li>
        <li><a href="#">Programs</a></li>
        <li><a href="#">Timetable</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>

    <section class="hero-section">
      <h1>Welcome to SkillForge Academy</h1>

      <p class="tagline">Building Skills for Tomorrow's Opportunities</p>

      <div class="media-card">
        <div class="display-screen">
          <div class="banner-text">MASTER TECHNOLOGY</div>

          <div class="media-controls">
            <div class="play-icon"></div>

            <div class="timeline-bar"></div>

            <div class="audio-icons">🔊 ⚙ ⛶</div>
          </div>
        </div>

        <audio controls>
          <source
            src="https://soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
            type="audio/mpeg"
          />
        </audio>
      </div>

      <button class="join-btn">Join Now</button>
    </section>
  </body>
</html>
